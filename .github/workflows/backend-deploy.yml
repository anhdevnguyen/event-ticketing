# Backend CD — trigger deploy lên Render sau khi CI pass trên main
#
# File này KHÔNG thay thế backend-ci.yml.
# backend-ci.yml:  chạy trên mọi push/PR (unit + integration tests)
# backend-deploy.yml:  chạy trên push main → re-run CI, rồi trigger Render deploy
#
# Tại sao chạy lại CI ở đây thay vì dùng workflow_run?
#   - workflow_run chỉ trigger khi workflow được chỉ định tên, và có giới hạn branch
#   - Cách đơn giản + đáng tin cậy hơn cho MVP: lặp lại steps test → deploy trong 1 job chain
#
# Secret cần cấu hình trong GitHub:
#   RENDER_DEPLOY_HOOK_URL  — lấy từ Render Dashboard → Service → Settings → Deploy Hooks
#
# Vercel frontend: tích hợp trực tiếp GitHub, tự deploy khi push main
# → không cần workflow CD riêng cho frontend.

name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

defaults:
  run:
    working-directory: backend

jobs:
  # ─── CI: Unit tests ───────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run unit tests
        run: bash ./mvnw -B test

  # ─── CI: Integration + Concurrency tests (Testcontainers) ─────────────────
  verify:
    name: Integration & Concurrency tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run full test suite (verify)
        run: bash ./mvnw -B verify
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

  # ─── CD: Deploy to Render ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, verify]          # Deploy chỉ chạy khi cả 2 CI jobs đều pass
    environment: production        # Hiển thị deployment history, có thể thêm manual approval

    steps:
      - name: Trigger Render Deploy Hook
        working-directory: .
        run: |
          echo "Triggering Render deploy..."
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "HTTP status: $status"
          if [[ "$status" != "2"* ]]; then
            echo "ERROR: Deploy hook returned $status"
            exit 1
          fi
          echo "Deploy triggered successfully. Monitor at: https://dashboard.render.com"
