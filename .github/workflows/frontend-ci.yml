# Frontend CI — chạy trên feature branches và Pull Requests
#
# Phân chia trách nhiệm:
#   frontend-ci.yml → feature branches + PRs (lint, unit test, build check)
#   Vercel          → push main: auto-deploy + preview deployments (tích hợp GitHub trực tiếp)
#
# E2E tests (Playwright) chỉ chạy khi mở PR — tốn thời gian, không cần mọi push.
# Vercel preview deploy tự tạo URL riêng cho mỗi PR/branch để review UI.

name: Frontend CI

on:
  push:
    branches:
      - "**"
      - "!main"       # Vercel lo phần main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  # ─── Job 1: Lint + TypeScript type check ──────────────────────────────────
  lint:
    name: Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─── Job 2: Unit tests (Vitest) ───────────────────────────────────────────
  unit-test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:run

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: frontend/coverage/
          retention-days: 14

  # ─── Job 3: Production build check ───────────────────────────────────────
  build:
    name: Production build (Vite)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1
          VITE_WS_URL: ws://localhost:8080/ws

  # ─── Job 4: E2E tests (Playwright) — chỉ khi PR ─────────────────────────
  # Không chạy trên feature branch push để tiết kiệm CI minutes.
  # Playwright cần full stack (backend + DB), tốn ~3-5 phút.
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-test, build]
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: event_ticketing_test
          POSTGRES_USER: event_ticketing
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U event_ticketing -d event_ticketing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Start backend in background
        working-directory: backend
        run: |
          bash ./mvnw -B spring-boot:run \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/event_ticketing_test \
            -Dspring.datasource.username=event_ticketing \
            -Dspring.datasource.password=ci_test_password \
            -Djwt.secret=ci-test-jwt-secret-must-be-at-least-256-bits-long-for-hs256-algorithm \
            -Djwt.access-token-expiration=900000 \
            -Djwt.refresh-token-expiration=604800000 \
            -Dcors.allowed-origins=http://localhost:5173 \
            -Dcookie.secure=false &
          echo "Backend started with PID $!"

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      # ── Chờ backend ready ─────────────────────────────────────────────────
      - name: Wait for backend health check
        run: |
          echo "Polling backend health..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 36 ]; then
              echo "ERROR: Backend did not start within 3 minutes"
              exit 1
            fi
            sleep 5
          done

      # ── Playwright ────────────────────────────────────────────────────────
      - name: Run E2E tests (Chromium only in CI)
        run: npx playwright test --project=chromium
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1
          VITE_WS_URL: ws://localhost:8080/ws

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
