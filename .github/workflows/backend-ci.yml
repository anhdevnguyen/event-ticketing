# Backend CI — chạy trên feature branches và Pull Requests
#
# Phân chia trách nhiệm:
#   backend-ci.yml  → feature branches + PRs  (test nhanh, feedback sớm)
#   backend-deploy.yml  → push main           (full test → deploy Render)
#
# Không chạy trên main push để tránh CI chạy đôi khi merge PR.
# backend-deploy.yml đã có đủ CI steps (test + verify) trước khi deploy.

name: Backend CI

on:
  push:
    branches:
      - "**"
      - "!main"       # Loại trừ main — backend-deploy.yml lo
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  # ─── Job 1: Unit tests (nhanh, mọi push) ─────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run unit tests
        run: bash ./mvnw -B test

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ─── Job 2: Integration + Concurrency tests — chỉ PR ─────────────────────
  # Feature branch pushes chỉ cần unit tests (feedback nhanh hơn).
  # Integration tests chạy khi mở/update PR (gate trước khi merge).
  verify:
    name: Integration & Concurrency tests (Testcontainers)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run full test suite including integration (Testcontainers)
        run: bash ./mvnw -B verify
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-integration
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          retention-days: 7
