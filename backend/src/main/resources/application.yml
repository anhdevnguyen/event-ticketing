# application.yml — Spring Boot 3.5.x
# Mọi secret/credential dùng ${ENV_VAR} placeholder — KHÔNG hardcode giá trị thật.

spring:
  application:
    name: event-ticketing

  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    driver-class-name: org.postgresql.Driver
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    url: ${DATABASE_URL_DIRECT:${DATABASE_URL:${SPRING_DATASOURCE_URL:}}}
    user: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

cookie:
  secure: ${COOKIE_SECURE:true}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.vanh.event_ticketing: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true