# application-test.yml — cấu hình cho Spring Integration/Concurrency tests
#
# Load khi @ActiveProfiles("test") được set trên AbstractIntegrationTest.
# Spring merge file này với application.yml — test profile thắng khi có conflict.
#
# Datasource URL/username/password KHÔNG set ở đây.
# AbstractIntegrationTest.@DynamicPropertySource sẽ inject URL động từ Testcontainers
# — DynamicPropertySource luôn có precedence cao nhất, override mọi file yml.
#
# Mục đích file này: cung cấp các required property không có default trong application.yml
# (đặc biệt jwt.secret) để ApplicationContext load được.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    # url/user/password KHÔNG set ở đây — AbstractIntegrationTest.@DynamicPropertySource
    # sẽ set spring.flyway.url = Testcontainers JDBC URL sau khi container khởi động

# JWT — đủ dài cho HS256 (≥ 32 ký tự)
jwt:
  secret: "test-secret-value-must-be-at-least-32-chars-long-for-hs256"
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# CORS
cors:
  allowed-origins: "http://localhost:5173"

# Cookie
cookie:
  secure: false

# OAuth2 — không test trong IT tests
oauth2:
  google:
    client-id: ""
    client-secret: ""

# Cloudinary — không test trong IT tests
cloudinary:
  cloud-name: ""
  api-key: ""
  api-secret: ""

# Logging — giảm noise khi chạy test
logging:
  level:
    root: WARN
    com.vanh.event_ticketing: INFO
    org.flywaydb: INFO
    org.testcontainers: INFO
    com.zaxxer.hikari: WARN
